<body class="flex items-center justify-center min-h-screen">
<!-- Onboarding Container -->
<main class="relative w-full max-w-[430px] h-screen max-h-[932px] bg-surface flex flex-col overflow-hidden shadow-2xl md:rounded-3xl border border-outline-variant">
<!-- Header / Progress Area -->

<div class="flex gap-2">
<!-- Step Indicators -->
<div class="h-1.5 w-10 bg-primary rounded-full"></div>
<div class="h-1.5 w-10 bg-surface-container-high rounded-full"></div>
<div class="h-1.5 w-10 bg-surface-container-high rounded-full"></div>
</div>
<button class="font-label-lg text-label-lg text-on-surface-variant hover:text-primary transition-colors duration-200">

            </button>
</header>
<!-- Main Content Canvas -->
<section class="flex-1 flex flex-col items-center justify-center px-margin-mobile">
<!-- Mockup Visual -->

<div class="w-8 h-8 rounded-full bg-white/90 backdrop-blur shadow-sm flex items-center justify-center">
<span class="material-symbols-outlined text-[18px]">close</span>
</div>
<div class="px-3 py-1.5 rounded-full bg-primary/90 backdrop-blur text-white font-label-md text-label-md shadow-lg">

</main>
<script>
        // Simple micro-interaction for the primary button
        const mainButton = document.querySelector('button');
        mainButton.addEventListener('mousedown', () => {
            mainButton.style.transform = 'scale(0.97)';
        });
        mainButton.addEventListener('mouseup', () => {
            mainButton.style.transform = 'scale(1)';
        });

        // Add subtle mouse-tracking movement to the mockup on desktop
        if (window.innerWidth > 768) {
            const card = document.querySelector('.glass-card');
            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg) rotateZ(1deg)`;
            });
        }
    </script>
