<!DOCTYPE html>

<style>
        body {
            background-color: #FFFFFF;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Subtle Fade-In Animation for Content */
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Continuous Loading Shimmer */
        .loader-bar {
            width: 140px;
            height: 3px;
            background-color: #F1F5F9;
            border-radius: 99px;
            overflow: hidden;
            position: relative;
        }

        .loader-progress {
            width: 40%;
            height: 100%;
            background-color: #3525cd;
            position: absolute;
            animation: loadingMove 1.5s infinite ease-in-out;
            border-radius: 99px;
        }

        @keyframes loadingMove {
            0% { left: -40%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        /* Logo Animation */
        .logo-mark {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .logo-mark:active {
            transform: scale(0.92);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest font-body-md text-on-surface">
<main class="relative flex flex-col items-center justify-center w-full h-full p-margin-mobile">
<!-- Logo Section: Identity Logic from JSON -->
<div class="fade-in flex flex-col items-center gap-base">
<div class="relative mb-md">
<!-- Abstract Logo Shape representing 'Curve' -->
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center shadow-sm logo-mark">
<span class="material-symbols-outlined text-white text-[40px]" style="font-variation-settings: 'wght' 600;">
                        architecture
                    </span>
</div>
<!-- Subtle background glow for premium feel -->
<div class="absolute -inset-4 bg-primary/5 blur-3xl rounded-full -z-10"></div>
</div>
<!-- Brand Typography Anchor -->
<h1 class="font-headline-md text-headline-md font-bold tracking-tight text-primary">
                CurveType
            </h1>
<p class="font-label-md text-label-md text-on-surface-variant tracking-wide uppercase opacity-60">
                Creative Studio
            </p>
</div>
<!-- Footer / Loading Area -->
<div class="absolute bottom-16 flex flex-col items-center gap-lg w-full px-xl">
<!-- Loading Indicator -->
<div class="loader-bar">
<div class="loader-progress"></div>
</div>
<!-- Contextual Info -->
<div class="text-center">
<p class="font-caption text-caption text-on-surface-variant mb-base opacity-40">
                    Version 2.4.0
                </p>
</div>
</div>
<!-- Decorative Background Element (Minimalist Mesh) -->
<div class="absolute inset-0 pointer-events-none -z-20 overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-surface-container-high rounded-full blur-[120px] opacity-40"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[30%] h-[30%] bg-primary/5 rounded-full blur-[100px] opacity-30"></div>
</div>
</main>
<!-- Optional micro-interaction script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Simulated loading transition
            setTimeout(() => {
                const progress = document.querySelector('.loader-progress');
                if (progress) {
                    // Logic for ending splash can be placed here
                    // e.g., window.location.href = '/home';
                }
            }, 3000);
        });

        // Simple haptic-like effect on logo click for fun
        const logo = document.querySelector('.logo-mark');
        logo.addEventListener('click', () => {
            if ('vibrate' in navigator) {
                navigator.vibrate(10);
            }
        });
    </script>
</body></html>
