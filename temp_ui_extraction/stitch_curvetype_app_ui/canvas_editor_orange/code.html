<style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0D0D0D;
            color: #f8ddd2;
            overflow: hidden;
            height: 100vh;
        }

        .material-symbols-outlined {

        }

        .glow-shadow-primary {
            box-shadow: 0px 4px 20px rgba(255, 107, 0, 0.2);
        }

        .curved-text-path {
            fill: transparent;
        }

        .text-path-content {
            fill: white;
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .drag-handle {
            width: 14px;
            height: 14px;
            background: #ffb693; /* primary */
            border: 2px solid white;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 107, 0, 0.5);
        }

        .arc-handle {
            width: 20px;
            height: 20px;
            background: #ff6b00; /* primary-container */
            border: 3px solid white;
            border-radius: 50%;
            position: absolute;
            cursor: ns-resize;
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.6);
        }

        /* Custom range styling */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: #333333;
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #ff6b00;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(255, 107, 0, 0.3);
        }

        .glass-panel {
            background: rgba(26, 26, 26, 0.85);
            backdrop-filter: blur(12px);
            border-top: 1px solid #333333;
        }

        .active-font-chip {
            background: rgba(255, 107, 0, 0.1);
            border: 1px solid #ff6b00;
            color: #ff6b00;
        }
    </style>
<style>

<!-- Micro-interaction Scripts -->
<script>
        // Simple logic to adjust curvature path based on slider
        const curvatureSlider = document.querySelectorAll('input[type=range]')[0];
        const pathElement = document.getElementById('curvePath');

        curvatureSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            const curveHeight = 250 - (val * 2.5); // Maps slider 0-100 to curve depth
            pathElement.setAttribute('d', `M 50 200 Q 300 ${curveHeight} 550 200`);
            
            // Visual feedback for slider percentage
            const percentageDisplay = e.target.previousElementSibling.querySelector('span');
            percentageDisplay.textContent = `${val}%`;
        });

        // Toggle panel height for focus (simulation)
        let isPanelExpanded = true;
        const dragBar = document.querySelector('.absolute.top-3.left-1\/2');
        dragBar.addEventListener('click', () => {
            const panel = document.getElementById('propertyPanel');
            if (isPanelExpanded) {
                panel.style.transform = 'translateY(calc(100% - 120px))';
            } else {
                panel.style.transform = 'translateY(0)';
            }
            isPanelExpanded = !isPanelExpanded;
        });

        // Ripple/Active effect for font chips
        const fontChips = document.querySelectorAll('.flex-shrink-0');
        fontChips.forEach(chip => {
            chip.addEventListener('click', () => {
                fontChips.forEach(c => {
                    c.classList.remove('active-font-chip');
                    c.classList.add('bg-[#262626]', 'text-on-surface-variant');
                });
                chip.classList.add('active-font-chip');
                chip.classList.remove('bg-[#262626]', 'text-on-surface-variant');
            });
        });
    </script>
